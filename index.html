    <style>
      :root {
        color-scheme: light;
        --coal: #161412;
        --iron: #2b2926;
        --ash: #f4f0ea;
        --paper: #fffaf2;
        --ember: #c84b31;
        --flame: #f2a33b;
        --copper: #8c4f35;
        --smoke: #756d63;
        --line: rgba(22, 20, 18, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      html {
        width: 100%;
        min-height: 100%;
        overflow-x: hidden;
        background: var(--ash);
      }

      body {
        width: 100%;
        min-height: 100vh;
        min-height: 100svh;
        margin: 0;
        overflow-x: hidden;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--coal);
        background:
          radial-gradient(circle at 78% 25%, rgba(242, 163, 59, 0.16), transparent 34rem),
          linear-gradient(135deg, #fffaf2 0%, #f2ece2 56%, #e6ddd1 100%);
      }

      main {
        min-height: 100vh;
        min-height: 100svh;
        display: grid;
        grid-template-columns: minmax(0, 1.18fr) minmax(18rem, 0.82fr);
        align-items: center;
        gap: clamp(2rem, 6vw, 6rem);
        width: min(1120px, calc(100% - 40px));
        max-width: 100%;
        margin: 0 auto;
        padding: clamp(2rem, 7vh, 5rem) 0;
        overflow: visible;
      }

      section {
        min-width: 0;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 0.7rem;
        margin: 0 0 1.25rem;
        color: var(--copper);
        font-size: clamp(0.78rem, 1.8vw, 0.9rem);
        font-weight: 750;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        width: 2rem;
        height: 2px;
        content: "";
        background: currentColor;
      }

      h1 {
        max-width: 100%;
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        font-size: clamp(3.1rem, 8.2vw, 6.45rem);
        font-weight: 700;
        line-height: 0.92;
        letter-spacing: 0;
      }

      .tagline {
        max-width: 30rem;
        margin: 1.35rem 0 0;
        color: var(--smoke);
        font-size: clamp(1.05rem, 1.8vw, 1.25rem);
        font-weight: 600;
        line-height: 1.45;
      }

      .visual {
        position: relative;
        width: 100%;
        max-width: 100%;
        min-height: clamp(30rem, 62vh, 42rem);
        display: grid;
        place-items: center;
        overflow: visible;
      }

      .hearth {
        position: relative;
        width: min(100%, 26rem);
        aspect-ratio: 0.74;
        display: grid;
        place-items: center;
        padding-bottom: 3.2rem;
      }

      .hearth::after {
        position: absolute;
        right: 13%;
        bottom: 2.85rem;
        left: 13%;
        height: 0.55rem;
        content: "";
        border-radius: 999px;
        background: linear-gradient(90deg, transparent, rgba(37, 33, 29, 0.18), transparent);
      }

      .pipe {
        position: absolute;
        top: 0;
        width: 5.1rem;
        height: 42%;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-bottom: 0;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.08), transparent 32%),
          linear-gradient(180deg, #383531, #211f1c);
        box-shadow: 22px 0 38px rgba(22, 20, 18, 0.13);
      }

      .stove {
        position: relative;
        z-index: 1;
        width: 100%;
        height: 66%;
        border-radius: 1.4rem 1.4rem 0.45rem 0.45rem;
        border: 1px solid rgba(255, 255, 255, 0.09);
        background:
          linear-gradient(115deg, rgba(255, 255, 255, 0.1), transparent 31%),
          linear-gradient(180deg, #373330, #171512 68%);
        box-shadow:
          0 2.4rem 4rem rgba(22, 20, 18, 0.24),
          inset 0 0 0 1px rgba(0, 0, 0, 0.22);
      }

      .stove::before,
      .stove::after {
        position: absolute;
        bottom: -2.35rem;
        width: 1.15rem;
        height: 2.85rem;
        content: "";
        border-radius: 0 0 0.2rem 0.2rem;
        background: linear-gradient(180deg, #171512, #25211d);
      }

      .stove::before {
        left: 3rem;
      }

      .stove::after {
        right: 3rem;
      }

      .door {
        position: absolute;
        inset: 18% 13% 17%;
        border: 1px solid rgba(244, 240, 234, 0.16);
        border-radius: 0.65rem;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.08), transparent 36%),
          radial-gradient(circle at 50% 88%, rgba(242, 163, 59, 0.44), transparent 40%),
          #13110f;
        overflow: hidden;
      }

      .door::before {
        position: absolute;
        inset: 1.1rem;
        content: "";
        border: 1px solid rgba(244, 240, 234, 0.13);
        border-radius: 0.45rem;
      }

      .handle {
        position: absolute;
        top: 45%;
        right: 7%;
        width: 0.7rem;
        height: 4.4rem;
        border-radius: 999px;
        background: linear-gradient(180deg, #d9b087, #8d6a4a);
        box-shadow: 0 0.2rem 0.8rem rgba(0, 0, 0, 0.32);
      }

      .flame {
        position: absolute;
        bottom: 13%;
        left: 50%;
        width: 7.2rem;
        height: 8.8rem;
        transform: translateX(-50%);
        filter: drop-shadow(0 0 1.6rem rgba(242, 163, 59, 0.52));
      }

      .flame span {
        position: absolute;
        bottom: 0;
        left: 50%;
        display: block;
        border-radius: 52% 48% 54% 46%;
        transform: translateX(-50%) rotate(45deg);
      }

      .flame span:nth-child(1) {
        width: 5.6rem;
        height: 5.6rem;
        background: var(--ember);
      }

      .flame span:nth-child(2) {
        width: 4rem;
        height: 4rem;
        bottom: 0.95rem;
        background: var(--flame);
      }

      .flame span:nth-child(3) {
        width: 2.35rem;
        height: 2.35rem;
        bottom: 1.8rem;
        background: #ffe1a4;
      }

      .plinth {
        position: absolute;
        right: 7%;
        bottom: 1.9rem;
        left: 7%;
        height: 1.95rem;
        border-radius: 999px;
        background:
          radial-gradient(ellipse at center, rgba(22, 20, 18, 0.24), rgba(22, 20, 18, 0.05) 68%, transparent 74%),
          linear-gradient(90deg, transparent, rgba(140, 79, 53, 0.16), transparent);
        filter: blur(0.18rem);
      }

      @media (max-width: 820px) {
        main {
          min-height: auto;
          grid-template-columns: 1fr;
          align-content: center;
          gap: 1.65rem;
          padding-top: 2rem;
          padding-bottom: 2.6rem;
          overflow: hidden;
        }

        h1 {
          max-width: 9.6ch;
          font-size: clamp(3rem, 12.5vw, 5.8rem);
        }

        .tagline {
          max-width: 20rem;
          margin-top: 1rem;
        }

        .visual {
          min-height: 25rem;
          overflow: hidden;
        }

        .hearth {
          width: min(72vw, 20rem);
        }
      }

      @media (max-width: 520px) {
        main {
          width: min(100% - 24px, 1120px);
          gap: 1.35rem;
          padding-top: 1rem;
          padding-bottom: 1.6rem;
        }

        .eyebrow {
          margin-bottom: 0.9rem;
        }

        h1 {
          font-size: clamp(2.55rem, 11.8vw, 3.45rem);
          line-height: 0.96;
        }

        .tagline {
          font-size: 1rem;
        }

        .visual {
          min-height: min(21rem, 48svh);
        }

        .hearth {
          width: min(70vw, 18rem);
        }
      }

      @media (max-width: 380px) {
        main {
          width: min(100% - 20px, 1120px);
        }

        .visual {
          min-height: 19rem;
        }

        .hearth {
          width: min(72vw, 16.2rem);
        }
      }
    </style>

    <main>

        <p class="eyebrow">Website im Aufbau</p>
        <h1 id="page-title">Ofenservice Roloff</h1>
        <p class="tagline">Wärme. Sicherheit. Handwerk.</p>
      </section>

      <section class="visual" aria-label="Illustration eines Ofens">
        <div class="hearth">
          <div class="pipe"></div>
          <div class="stove">
            <div class="door">
              <div class="flame" aria-hidden="true">
                <span></span>
                <span></span>
                <span></span>
              </div>
            </div>
            <div class="handle"></div>
          </div>
          <div class="plinth"></div>
        </div>
      </section>
    </main>
  </body>
