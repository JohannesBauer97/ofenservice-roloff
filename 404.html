<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seite nicht gefunden – Ofenservice Roloff</title>
  <meta name="description" content="Diese Seite existiert nicht. Zurück zur Startseite von Ofenservice Roloff in Tangermünde.">
  <meta name="robots" content="noindex, follow">
  <link rel="preload" href="fonts/Roboto-VariableFont_wdth,wght.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="style.css">
  <style>
    .error-block {
      padding: 5rem 0 6rem;
    }
    .error-code {
      display: block;
      font-variation-settings: 'wght' 800, 'wdth' 90;
      font-size: clamp(5rem, 18vw, 9rem);
      line-height: 1;
      color: var(--copper);
      opacity: 0.18;
      letter-spacing: -0.04em;
      margin-bottom: -0.5rem;
      user-select: none;
    }
    .error-block h1 {
      margin-bottom: 1rem;
    }
    .error-desc {
      font-variation-settings: 'wght' 400, 'wdth' 100;
      font-size: 1rem;
      color: var(--muted);
      line-height: 1.7;
      max-width: 420px;
      margin-bottom: 2.5rem;
    }
  </style>
</head>
<body>

  <header>
    <div class="container">
      <a href="/" class="logo-link" aria-label="Ofenservice Roloff – Startseite">
        <img src="logo.webp" alt="Ofenservice Roloff" class="site-logo" width="652" height="378">
      </a>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="error-block">
        <span class="error-code" aria-hidden="true">404</span>
        <span class="eyebrow">Fehler 404</span>
        <h1>Seite nicht gefunden</h1>
        <p class="error-desc">Die gesuchte Seite existiert nicht oder wurde verschoben. Auf der Startseite finden Sie alle Informationen zu meinen Leistungen und Kontaktmöglichkeiten.</p>
        <a href="/" class="btn-primary">Zur Startseite</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="container footer-inner">
      <span>&copy; <script>document.write(new Date().getFullYear())</script> Ofenservice Roloff</span>
      <nav aria-label="Rechtliche Links">
        <a href="/impressum.html">Impressum</a>
        <a href="/datenschutz.html">Datenschutz</a>
      </nav>
    </div>
  </footer>

</body>
</html>
